<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Gerador de Senhas</h1>

        <div class="senhagerada">
            <input type="text" id="senha" readonly>
            <button id="copiar">Copiar</button>
        </div>

        <div class="config">
            <label>Tamanho da senha</label>
            <input type="range" id="tamanho" min="4" max="30" value="12">
            <span id="valorTamanho">12</span>

            <div class="checks">
                <label>
                    <input type="checkbox" id="maiusculas" checked>
                    Letras maiúsculas
                </label>

                <label>
                    <input type="checkbox" id="numeros" checked>
                    Números
                </label>

                <label>
                    <input type="checkbox" id="simbolos" checked>
                    Símbolos
                </label>
            </div>
        </div>

        <div class="botao">
            <button id="gerar">Gerar Senha</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
